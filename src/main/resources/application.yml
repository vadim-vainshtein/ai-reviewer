spring:
  application:
    name: ai-reviewer
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_reviewer}
    username: ${SPRING_DATASOURCE_USERNAME:ai_reviewer}
    password: ${SPRING_DATASOURCE_PASSWORD:ai_reviewer}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
